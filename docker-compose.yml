services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowmatic
      POSTGRES_USER: Admin
      POSTGRES_PASSWORD: Admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Admin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
