[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "pnpm --filter @flowmatic/web build"
  publish = "apps/web/dist"
  base = "."

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
